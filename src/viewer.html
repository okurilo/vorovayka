<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Виджетрон</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <div class="hero__brand">
          <p class="eyebrow">Виджетрон</p>
          <span class="hero__badge">Рабочая область</span>
        </div>
        <h1>Проверка виджета и его данных</h1>
        <p class="lead">Просматривайте DOM, сверяйте связанные API и собирайте чистый экспорт без лишнего шума.</p>
      </header>

      <section id="state" class="card">
        <p>Жду новый или последний сохранённый захват...</p>
      </section>

      <section class="card card--debug">
        <details class="debug-panel">
          <summary>Технические детали capture</summary>
          <pre id="json"></pre>
        </details>
      </section>
    </main>
    <script type="module" src="./viewer.js"></script>
  </body>
</html>
